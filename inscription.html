<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription – Messagerie Instantanée</title>
    <link rel="stylesheet" href="inscription.css">
</head>
<body>
    <!-- Subtle grid texture layer -->
    <div class="page-grid-overlay"></div>

    <!-- Message de maintenance -->
    <div class="maintenance-banner">
        🚧 La messagerie est en maintenance. Il peut y avoir des bugs. 🚧
    </div>

    <div class="inscription-container" id="inscription-container">
        <!-- Animated icon at the top of the card -->
        <div class="card-icon">✦</div>
        <h2>Créer un compte</h2>
        <p class="subtitle">Rejoignez la messagerie en quelques secondes</p>

        <input type="text"     id="reg-username"         placeholder="Nom d'utilisateur" autocomplete="off">
        <input type="password" id="reg-password"         placeholder="Mot de passe">
        <input type="password" id="reg-password-confirm" placeholder="Confirmer le mot de passe">
        <div id="reg-error" class="error-message" style="display: none;"></div>
        <button id="reg-button">S'inscrire</button>
        <p class="back-link"><a href="index.html">← Retour à la connexion</a></p>
    </div>

    <!-- Full-screen success overlay (checkmark + text) -->
    <div class="success-overlay" id="success-overlay">
        <div class="success-circle">
            <svg viewBox="0 0 56 56">
                <path class="check-path" d="M12 30 L24 42 L44 16"/>
            </svg>
        </div>
        <div class="success-text">
            <h2>Compte créé !</h2>
            <p>Vous êtes redirigé vers la connexion…</p>
        </div>
    </div>

    <!-- Canvas for confetti particles -->
    <canvas id="confetti-canvas"></canvas>
    <!-- Logo Supabase inline SVG -->
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
          viewBox="0 0 109 113" fill="none" aria-label="Supabase" role="img">
          <path d="M63.7076 110.284C60.8481 113.885 55.0502 111.912 54.9813 107.314L53.9738 40.0627L99.1935 40.0627C107.384 40.0627 111.952 49.5228 106.859 55.9374L63.7076 110.284Z" fill="url(#sb-a)"/>
          <path d="M63.7076 110.284C60.8481 113.885 55.0502 111.912 54.9813 107.314L53.9738 40.0627L99.1935 40.0627C107.384 40.0627 111.952 49.5228 106.859 55.9374L63.7076 110.284Z" fill="url(#sb-b)" fill-opacity="0.2"/>
          <path d="M45.317 2.07103C48.1765-1.53037 53.9745.442937 54.0434 5.041L54.4849 72.2922H9.83113C1.64038 72.2922-2.92775 62.8321 2.1655 56.4175L45.317 2.07103Z" fill="#3ECF8E"/>
          <defs>
            <linearGradient id="sb-a" x1="53.9738" y1="54.974" x2="94.1635" y2="71.8295" gradientUnits="userSpaceOnUse">
              <stop stop-color="#249361"/><stop offset="1" stop-color="#3ECF8E"/>
            </linearGradient>
            <linearGradient id="sb-b" x1="36.1558" y1="30.578" x2="54.4844" y2="65.0806" gradientUnits="userSpaceOnUse">
              <stop/><stop offset="1" stop-opacity="0"/>
            </linearGradient>
          </defs>
        </svg>
        <strong>Supabase Realtime</strong>

    <script type="module" src="inscription.js"></script>
</body>
</html>
