<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messagerie instantanée de Marin</title>
    <meta name="description" content="Messagerie instantanée de Marin pour discuter rapidement en ligne.">
    <meta name="robots" content="index, follow">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-grid-overlay"></div>

    <div class="maintenance-banner">
        🚧 La messagerie est en maintenance. Il peut y avoir des bugs. 🚧
    </div>

    <div class="login-container" id="login-container">
        <h2>Connexion</h2>
        <p class="subtitle">Bienvenue, connectez-vous pour continuer</p>
        <input type="text"     id="login-username" placeholder="Nom d'utilisateur">
        <input type="password" id="login-password" placeholder="Mot de passe">
        <button id="login-button">Se connecter</button>
        <p class="inscription-link"><a href="inscription.html">Pas de compte ? → S'inscrire</a></p>
        <p class="suggestions-link"><a href="suggestions.html">💡 Vos suggestions</a></p>
    </div>

    <div class="connected-user" id="connected-user" style="display: none;">
        <p>
            <span class="status-dot"></span>
            Connecté : <span id="connected-username"></span>
            <span id="network-indicator" class="network-indicator" title="Qualité réseau"></span>
        </p>
        <button id="logout-button">Déconnexion</button>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <h1>💬 <span>Messagerie</span> Instantanée</h1>
        </div>

        <div class="user-selection">
            <label for="user-select">Vers</label>
            <select id="user-select"></select>
            <!-- #call-audio-btn injecté ici par app.js -->
        </div>

        <!-- Indicateur "en train d'écrire" -->
        <div class="typing-indicator" id="typing-indicator" style="display: none;"></div>

        <!-- Réponses rapides suggérées -->
        <div class="quick-replies-container" id="quick-replies" style="display: none;"></div>

        <div class="chat-messages" id="chat-messages"></div>

        <!-- voice-effects-panel injecté par app.js -->
        <!-- voice-locked-bar injectée par app.js -->
        <!-- voice-slide-hint injectée par app.js -->

        <div class="chat-input">
            <input type="text" id="message-input" placeholder="Tapez votre message…">
            <button id="emoji-button" class="icon-button emoji-button" title="Insérer un emoji">😊</button>
            <!-- #voice-record-btn injecté ici par app.js -->
            <!-- #font-button injecté ici par app.js -->
            <button id="send-button">Envoyer</button>
        </div>

        <div id="upload-progress" class="upload-progress" style="display: none;"></div>
    </div>

    <!-- Emoji Picker Popup -->
    <div class="emoji-picker-wrapper" id="emoji-picker-wrapper" style="display: none;">
        <emoji-picker></emoji-picker>
    </div>
    <!-- Logo Supabase inline SVG -->
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
          viewBox="0 0 109 113" fill="none" aria-label="Supabase" role="img">
          <path d="M63.7076 110.284C60.8481 113.885 55.0502 111.912 54.9813 107.314L53.9738 40.0627L99.1935 40.0627C107.384 40.0627 111.952 49.5228 106.859 55.9374L63.7076 110.284Z" fill="url(#sb-a)"/>
          <path d="M63.7076 110.284C60.8481 113.885 55.0502 111.912 54.9813 107.314L53.9738 40.0627L99.1935 40.0627C107.384 40.0627 111.952 49.5228 106.859 55.9374L63.7076 110.284Z" fill="url(#sb-b)" fill-opacity="0.2"/>
          <path d="M45.317 2.07103C48.1765-1.53037 53.9745.442937 54.0434 5.041L54.4849 72.2922H9.83113C1.64038 72.2922-2.92775 62.8321 2.1655 56.4175L45.317 2.07103Z" fill="#3ECF8E"/>
          <defs>
            <linearGradient id="sb-a" x1="53.9738" y1="54.974" x2="94.1635" y2="71.8295" gradientUnits="userSpaceOnUse">
              <stop stop-color="#249361"/><stop offset="1" stop-color="#3ECF8E"/>
            </linearGradient>
            <linearGradient id="sb-b" x1="36.1558" y1="30.578" x2="54.4844" y2="65.0806" gradientUnits="userSpaceOnUse">
              <stop/><stop offset="1" stop-opacity="0"/>
            </linearGradient>
          </defs>
        </svg>
        <strong>Supabase Realtime</strong>

    <!-- #call-overlay injecté dans body par app.js -->

    <script type="module" src="app.js"></script>
</body>
</html>
